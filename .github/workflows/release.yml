name: Release

# Triggered by pushing a version tag, e.g. `git tag v0.1.0 && git push origin v0.1.0`.
# Builds the `lot` binary for each target and uploads archives + checksums
# to a GitHub Release for the tag.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Create the GitHub Release once, before the matrix uploads assets to it.
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/create-gh-release-action@v1
        with:
          # Release title is the version with the leading `v` stripped, e.g. 0.1.0.
          title: $version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload-assets:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: lot
          target: ${{ matrix.target }}
          # Archive name, e.g. lot-v0.1.0-aarch64-apple-darwin.tar.gz
          archive: lot-$tag-$target
          tar: unix
          zip: windows
          checksum: sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
